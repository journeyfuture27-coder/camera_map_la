<!DOCTYPE html>
<html>
<head>
    <title>Карта объектов (АЗС/Камеры)</title>
    <style> body { margin: 0; font-family: Arial; } #map { width: 100%; height: 100vh; } </style>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=eef841e5-c60b-4c91-a933-d22090ea8fa7&lang=ru_RU"></script>
</head>
<body>
    <div id="map"></div>
    <script>
        let myMap;
        ymaps.ready(init);

        function init() {
            myMap = new ymaps.Map("map", {
                center: [56.791922, 60.571735],  // Екатеринбург по умолчанию
                zoom: 10
            });

            // ЗАМЕНИТЕ НА ВАШИ ДАННЫЕ ИЗ AIRTABLE
            const AIRTABLE_TOKEN = 'patQti35eE2qFQYKK.fdd589ae9c5b728679a0bdc3f82fc98371601bb5b7b6310a10f4093f4219f8be';  // Ваш Personal Access Token
            const AIRTABLE_BASE = 'appSQMpP8Kh4i466S';  // Base ID (app...)
            const AIRTABLE_TABLE = 'tbl70cRzDcyF5l6po';  // Table ID (tbl...)

            fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE}/${AIRTABLE_TABLE}`, {
                headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` }
            })
            .then(response => response.json())
            .then(data => {
                data.records.forEach(record => {
                    const fields = record.fields;
                    if (fields.lat && fields.lon && !isNaN(fields.lat) && !isNaN(fields.lon)) {
                        const placemark = new ymaps.Placemark([fields.lat, fields.lon], {
                            hintContent: fields['название'] || fields.Название || 'Объект',
                            balloonContent: `
                                <strong>${fields['название'] || 'Без названия'}</strong><br>
                                ${fields['описание'] || fields.Описание || 'Нет описания'}<br>
                                ${fields['ссылка'] ? `<a href="${fields['ссылка']}" target="_blank">Перейти на сайт</a><br>` : ''}
                                ${fields['фото'] && fields['фото'][0] ? `<img src="${fields['фото'][0].url}" style="max-width:250px;">` : ''}
                                <br>ID: ${fields['номер'] || record.id}
                            `
                        }, {
                            preset: 'islands#icon',
                            iconColor: '#0095b6',
                            iconShape: 'circle'
                        });

                        // Hover-выделение
                        placemark.events.add('mouseenter', () => {
                            placemark.options.set({ iconColor: '#ff0000', zIndex: 999 });
                        });
                        placemark.events.add('mouseleave', () => {
                            placemark.options.set({ iconColor: '#0095b6' });
                        });

                        myMap.geoObjects.add(placemark);
                    }
                });
                // Автозум на все метки
                if (myMap.geoObjects.getLength() > 0) {
                    myMap.setBounds(myMap.geoObjects.getBounds(), { checkZoomRange: true });
                }
            })
            .catch(error => {
                console.error('Ошибка Airtable:', error);
                myMap.balloon.open([56.791922, 60.571735], 'Ошибка загрузки данных. Проверьте TOKEN/Base/Table ID.<br>Консоль: F12');
            });
        }
    </script>
</body>
</html>
