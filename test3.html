<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Яндекс Карты - Простой маркер</title>
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="info" id="info">Загрузка карты...</div>

    <script src="https://api-maps.yandex.ru/v3/?apikey=0c8158f3-19bb-4894-a380-7a632583d6d4&lang=ru_RU"></script>
    <script>
        const infoDiv = document.getElementById('info');
        
        ymaps3.ready.then(() => {
            infoDiv.textContent = 'Создание карты...';
            
            // 1. Создаем карту
            const map = new ymaps3.YMap(document.getElementById('map'), {
                location: {
                    center: [55.751574, 37.573856], // Москва
                    zoom: 12
                }
            });
            
            // 2. Добавляем слой карты (обязательно)
            map.addChild(new ymaps3.YMapDefaultSchemeLayer());
            
            // 3. Добавляем слой для маркеров (это критически важно!)
            //    Без этого слоя маркеры не будут работать
            map.addChild(new ymaps3.YMapDefaultFeaturesLayer({ zIndex: 1800 }));
            
            infoDiv.textContent = 'Добавляем маркер...';
            
            // 4. Создаем HTML-элемент для маркера
            const markerElement = document.createElement('div');
            markerElement.innerHTML = '📍';
            markerElement.style.fontSize = '40px';
            markerElement.style.cursor = 'pointer';
            markerElement.style.filter = 'drop-shadow(0 2px 4px rgba(0,0,0,0.3))';
            markerElement.style.transition = 'transform 0.2s';
            
            markerElement.onmouseenter = () => {
                markerElement.style.transform = 'scale(1.2)';
            };
            markerElement.onmouseleave = () => {
                markerElement.style.transform = 'scale(1)';
            };
            
            // 5. Создаем маркер
            const marker = new ymaps3.YMapMarker(
                {
                    coordinates: [55.751574, 37.573856],
                    draggable: false
                },
                markerElement
            );
            
            // 6. Добавляем маркер на карту
            map.addChild(marker);
            
            // 7. Обработчик клика
            markerElement.addEventListener('click', () => {
                alert('🎉 Маркер работает! Карта готова.');
            });
            
            infoDiv.textContent = '✅ Карта готова! Кликните на маркер.';
            
        }).catch(error => {
            infoDiv.textContent = '❌ Ошибка: ' + error.message;
            console.error('Ошибка:', error);
        });
    </script>
</body>
</html>
